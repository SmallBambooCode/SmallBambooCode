<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>与SmallBamboo的社交匹配度测评 v2.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fafafa; color: #333; line-height: 1.6; min-height: 100vh; }

        nav { position: fixed; top: 0; width: 100%; padding: 20px 60px; display: flex; justify-content: center; align-items: center; z-index: 1000; background: rgba(250, 250, 250, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .logo { font-size: 18px; font-weight: 600; color: #000; }

        .container { max-width: 850px; margin: 0 auto; padding: 120px 20px 60px; }
        h1 { text-align: center; margin-bottom: 12px; font-size: 2.2em; font-weight: 700; color: #000; }
        .intro { text-align: center; color: #666; margin-bottom: 60px; font-size: 0.95em; }

        .question { margin-bottom: 40px; padding: 30px; background: white; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .question-text { margin-bottom: 28px; font-size: 1.05em; color: #000; font-weight: 500; }
        .question-number { color: #888; font-weight: 600; margin-right: 8px; font-family: monospace; }

        .slider-container { margin-bottom: 16px; padding: 0 10px; }
        .slider { width: 100%; height: 5px; border-radius: 5px; background: #eee; outline: none; -webkit-appearance: none; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #000; cursor: pointer; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s; }
        .slider::-webkit-slider-thumb:hover { transform: scale(1.15); }

        .labels {display:grid;grid-template-columns: 0.5fr 1fr 1fr 1fr 0.5fr;align-items:center;height:25px;font-size:0.85em;color:#999;margin-top:10px;padding:0 10px;}
        .labels span {position:static;transform:none;white-space:nowrap;text-align:center;}
        .labels span:nth-child(1) { text-align: left; }
		.labels span:nth-child(5) { text-align: right; }

        .submit-btn { width: 100%; max-width: 350px; display: block; margin: 50px auto 0; padding: 16px; background: #000; color: white; border: none; border-radius: 50px; font-size: 1.1em; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }

        .result { display: none; margin-top: 60px; padding: 40px; background: white; border-radius: 16px; border: 1px solid #eee; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .result.show { display: block; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .result-score { text-align: center; font-size: 3.5em; font-weight: 800; margin-bottom: 10px; color: #000; }
        .result-title { text-align: center; font-size: 1.6em; font-weight: 600; margin-bottom: 30px; color: #222; }
        .result-diff { margin-bottom: 24px; padding: 20px; background: #f8f9fa; border-radius: 8px; border-left: 5px solid #000; line-height: 1.7; font-size: 0.95em; }
        .result-description { margin-bottom: 24px; line-height: 1.8; color: #444; }
        .result-suggestion { padding: 24px; background: #fff; border-radius: 8px; border: 1px dashed #ddd; line-height: 1.8; font-size: 0.95em; }
        
        .reset-btn { width: 100%; max-width: 250px; display: block; margin: 30px auto 0; padding: 12px; background: none; color: #999; border: 1px solid #eee; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .reset-btn:hover { border-color: #999; color: #666; }

        @media (max-width: 768px) {
            nav { padding: 15px 20px; }
            .container { padding: 100px 15px 40px; }
            h1 { font-size: 1.8em; }
            .labels { font-size: 0.72em; }
            .result-score { font-size: 2.8em; }
        }
    </style>
</head>
<body>
    <nav><div class="logo">与SmallBamboo的社交匹配度测试</div></nav>

    <div class="container">
        <h1>社交匹配度测评</h1>
        <p class="intro">探索我们在认知、边界与协作节奏上的共鸣深度</p>

        <form id="quizForm">
            <div id="questionsContainer"></div>
            <button type="submit" class="submit-btn">获取深度解析</button>
        </form>

        <div class="result" id="result">
            <div class="result-score" id="resultScore">0</div>
            <div class="result-title" id="resultTitle"></div>
            <div class="result-diff" id="resultDiff"></div>
            <div class="result-description" id="resultDescription"></div>
            <div class="result-suggestion" id="resultSuggestion"></div>
            <button class="reset-btn" onclick="resetQuiz()">重新测试</button>
        </div>
    </div>

    <script>
        const questions = [
            { id: 1, text: "面对确定的计划，相比于“看情况再说”，我更倾向于严格推进，变动时会优先同步信息以降低他人的不确定性。", reverse: false },
            { id: 2, text: "在传递负面反馈时，我认为照顾对方的情绪和体面，比直接剖析客观事实更重要。", reverse: true },
            { id: 3, text: "我认为良好的人际关系必须通过规律性的高频互动来维持，很难适应“长期待机、偶尔唤醒”的交往模式。", isNeutral: true }, 
            { id: 4, text: "相比于日常寒暄，我更容易在探讨具体的观点、事物本质或专业问题时，感受到与他人的连接感。", reverse: false },
            { id: 5, text: "即使在情绪激动时，我也习惯将“发泄情绪”与“解决问题”隔离，尽量避免在沟通中掺杂强烈的主观评判。", reverse: false },
            { id: 6, text: "当意见不合时，我更容易首先被对方的语气和态度激怒，而不是优先去梳理对方背后的逻辑线索。", reverse: true },
            { id: 7, text: "在协作时，我习惯在有了最终成果才向他人展示，不太适应在半成品阶段频繁地同步过程细节。", reverse: true },
            { id: 8, text: "对于没有标准答案、甚至看似“无用”的抽象理论和可能性探讨，我常常能从中获得乐趣并深度投入。", reverse: false },
            { id: 9, text: "在建立起足够的安全感后，当发现优质的事物或活动时，我会积极邀请并推动对方参与，将其视为加深连接的方式。", isNeutral: true },
            { id: 10, text: "为了保持社交氛围的融洽，我经常会适度隐藏自己的真实看法，给出符合对方期待的赞美或附和。", reverse: true },
            { id: 11, text: "在熟悉的关系中，我能够精准把握“直言不讳”的分寸，既能触及核心问题，又不会破坏彼此的信任底线。", reverse: false },
            { id: 12, text: "当讨论陷入目标模糊、停滞不前时，我会自然而然想要理清现状，主动搭建框架并推动下一步。", reverse: false },
            { id: 13, text: "在建立起足够的安全感后，我愿意展露自己感性、非理性的一面，不再仅仅依靠理性的外壳来维持形象。", reverse: false },
            { id: 14, text: "面对不太熟悉的人提出的不合理请求，我更习惯用委婉绕弯的方式回避，而不是直接给出冷酷的拒绝。", reverse: true },
            { id: 15, text: "我认为沟通的终极目的是得出可执行的结论，过度发散且无法落地的讨论会让我感到精力内耗。", isNeutral: true },
            { id: 16, text: "我习惯于在非常确定、不可变更的规则内行事，对于需要大量临场发挥、边界模糊的协作环境感到极度不适。", reverse: true }
        ];

        const container = document.getElementById('questionsContainer');
        questions.forEach((q, index) => {
            container.innerHTML += `
                <div class="question">
                    <div class="question-text"><span class="question-number">${String(index + 1).padStart(2, '0')}</span>${q.text}</div>
                    <div class="slider-container">
                        <input type="range" class="slider" min="0" max="4" value="2" 
                            data-question="${q.id}" 
                            data-reverse="${q.reverse || false}"
                            data-neutral="${q.isNeutral || false}">
                    </div>
                    <div class="labels">
                        <span>完全不同意</span><span>不太同意</span><span>中立</span><span>比较同意</span><span>完全同意</span>
                    </div>
                </div>`;
        });

        document.getElementById('quizForm').addEventListener('submit', (e) => {
            e.preventDefault();
            let totalScore = 0;
            document.querySelectorAll('.slider').forEach(slider => {
                let score = parseInt(slider.value);
                if (slider.dataset.neutral === 'true') {
                    if (score === 2) score = 4;
                    else if (score === 1 || score === 3) score = 3;
                    else score = 1;
                } else if (slider.dataset.reverse === 'true') {
                    score = 4 - score;
                }
                totalScore += score;
            });

            let title, diff, description, suggestion;
            if (totalScore <= 19) {
                title = '引力背离 (匹配度 0-30%)';
                diff = '【差异点】我的底层代码是“逻辑透明化”，而您的操作系统可能更侧重“高度情感融合”或“非线性社交”。';
                description = '我们在信息对齐的频次、反馈的直白程度上有根本冲突。我可能会让您觉得咄咄逼人或冷漠，而您可能会让我感到认知带宽过载。';
                suggestion = '<strong>建议：</strong>保持“低带宽社交”。仅在必要时通过纯文本进行目标对齐，避免在模糊场景下进行深度合作。';
            } else if (totalScore <= 33) {
                title = '错位互补 (匹配度 31-52%)';
                diff = '【差异点】我们在社交节奏上有明显错位，例如我对“边界”的需求与您对“共鸣”的需求不匹配。';
                description = '您在应对陌生人或压力环境时表现出的回避/委婉，与我习惯的“直击本质”存在翻译隔阂。我们需要大量的沟通补丁才能完成同步。';
                suggestion = '<strong>建议：</strong>协作时建立“缓冲带”。您可以尝试将感性需求外包给他人，而将明确的逻辑任务交给我处理。';
            } else if (totalScore <= 46) {
                title = '求同存异 (匹配度 53-72%)';
                diff = '【差异点】基础层高度兼容，但在“灵活度”与“结论导向”的边缘地带仍需磨合。';
                description = '我们都能理解关键节点同步的重要性，也尊重彼此的独立思考。主要的潜在摩擦在于：当我进入极致的发散模式或极致的框架化时，您的适应速度可能稍慢。';
                suggestion = '<strong>建议：</strong>适合作为“项目伙伴”。在开始前通过简单的规则定义边界，后续即可享受高效的独立产出和定期的有质量同步。';
            } else if (totalScore <= 56) {
                title = '同频共振 (匹配度 73-88%)';
                diff = '【共鸣点】在边界感、沟通权重、安全感建立等方面，我们拥有极高的共识。';
                description = '您非常理解“思考惯性”的重要性，知道什么时候该闭嘴、什么时候该对齐。我们不仅能在一起做事，也能在一起进行高质量的“精神漫游”，且无需担心产生误读。';
                suggestion = '<strong>建议：</strong>可尝试长期深度绑定。您的灵活性与我的框架感能够完美融合，产生 1+1>2 的创造性输出。';
            } else {
                title = '认知镜像 (匹配度 89-100%)';
                diff = '【共鸣点】底层代码几乎完全一致：追求高效对齐，同时极度尊重彼此的思维惯性。';
                description = '这是极其罕见的“认知双子”状态。在对复杂事物的处理上，我们的第一反应通常高度重合。交流本身就是一种休息，协作效率趋于物理上限。';
                suggestion = '<strong>建议：</strong>直接进入“无预热协作”模式。这种匹配度往往预示着极高的长期关系稳定性。';
            }

            document.getElementById('resultScore').innerHTML = `${totalScore}<span style="font-size:0.4em;color:#999"> / 64</span>`;
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultDiff').innerHTML = diff;
            document.getElementById('resultDescription').textContent = description;
            document.getElementById('resultSuggestion').innerHTML = suggestion;
            document.getElementById('result').classList.add('show');
            document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
        });

        function resetQuiz() {
            document.querySelectorAll('.slider').forEach(s => s.value = 2);
            document.getElementById('result').classList.remove('show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
